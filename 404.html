<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(140deg, #eef2ff, #dbeafe);
      color: #0f172a;
    }
    .card {
      text-align: center;
      padding: 24px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      border: 1px solid #bfdbfe;
      width: min(520px, 90vw);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }
    p {
      margin: 0 0 14px;
      color: #334155;
    }
    a {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: #ffffff;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <p>The page you requested could not be found.</p>
    <a href="/">Back to PWM Demo</a>
  </main>
</body>
</html>
